name: Zampto Auto Renew

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:

env:
  BROWSER_MODE: playwright
  HEADLESS: "false"
  USE_PROXY: "true"
  ZAMPTO_EMAIL: ${{ secrets.ZAMPTO_EMAIL }}
  ZAMPTO_PASSWORD: ${{ secrets.ZAMPTO_PASSWORD }}
  SERVER_IDS: ${{ secrets.SERVER_IDS }}

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb wget
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i google-chrome-stable_current_amd64.deb || sudo apt-get -f install -y
          google-chrome --version

      - name: Install Python dependencies
        run: |
          pip install playwright
          playwright install-deps chromium

      - name: Setup sing-box proxy
        run: |
          # Download sing-box
          curl -sLo /tmp/sing-box.tar.gz "https://github.com/SagerNet/sing-box/releases/download/v1.11.4/sing-box-1.11.4-linux-amd64.tar.gz"
          tar -xzf /tmp/sing-box.tar.gz -C /tmp
          sudo mv /tmp/sing-box-*/sing-box /usr/local/bin/sing-box
          sudo chmod +x /usr/local/bin/sing-box

          # Generate config
          cat > /tmp/sing-box.json <<EOF
          {
            "inbounds": [
              {
                "type": "mixed",
                "listen": "127.0.0.1",
                "listen_port": 10808
              }
            ],
            "outbounds": [
              {
                "type": "hysteria2",
                "server": "${{ secrets.PROXY_SERVER }}",
                "server_port": ${{ secrets.PROXY_PORT }},
                "password": "${{ secrets.PROXY_PASSWORD }}",
                "tls": {
                  "enabled": true,
                  "server_name": "${{ secrets.PROXY_SNI }}",
                  "insecure": true
                }
              }
            ]
          }
          EOF

          # Start sing-box in background
          nohup sing-box run -c /tmp/sing-box.json > /tmp/sing-box.log 2>&1 &
          sleep 5
          echo "Sing-box started"
          cat /tmp/sing-box.log || true

      - name: Run renewal
        run: xvfb-run -a python zampto_auto_renew.py once

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
          retention-days: 3

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: |
            logs/
            renew_status.json
          retention-days: 30
